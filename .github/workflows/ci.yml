name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # PyO3 0.22 supports up to Python 3.13
  # https://github.com/PyO3/pyo3/issues/4584
  PYO3_PYTHON: python3.13

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features
      - run: cargo clippy --all-targets --no-default-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo test --no-default-features

  build-release:
    name: Build Release Binary
    needs: [fmt, clippy, test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: logmedic
          - os: ubuntu-latest-arm
            target: aarch64-unknown-linux-gnu
            artifact: logmedic
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: logmedic
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: logmedic.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set Python library path for linker
        if: runner.os == 'Linux'
        run: |
          PY_PREFIX=$(python3.13 -c "import sys; print(sys.prefix)")
          echo "LIBRARY_PATH=${PY_PREFIX}/lib" >> $GITHUB_ENV
      - name: Set PYO3_PYTHON for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: echo "PYO3_PYTHON=python" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: logmedic-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
