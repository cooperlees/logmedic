name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # PyO3 0.22 supports up to Python 3.13
  # https://github.com/PyO3/pyo3/issues/4584
  PYO3_PYTHON: python3.13

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features
      - run: cargo clippy --all-targets --no-default-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo test --no-default-features

  build-release:
    name: Build Release Binary
    needs: [fmt, clippy, test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: logmedic
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: logmedic
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: logmedic
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: logmedic.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set Python library path for linker
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          PY_PREFIX=$(python3.13 -c "import sys; print(sys.prefix)")
          echo "LIBRARY_PATH=${PY_PREFIX}/lib" >> $GITHUB_ENV
      - name: Set up aarch64 Linux cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          # Restrict existing apt sources to amd64 to avoid 404 errors when
          # fetching arm64 indices from archives that only serve amd64.
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's/^deb \(http\)/deb [arch=amd64] \1/' /etc/apt/sources.list
          fi
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] || continue
            if ! grep -q '^Architectures:' "$f"; then
              sudo sed -i '/^Types: deb/a Architectures: amd64' "$f"
            fi
          done
          # deadsnakes PPA provides libpython3.13-dev:arm64 which Ubuntu 24.04's
          # built-in arm64 archive does not include.
          sudo add-apt-repository -y -n ppa:deadsnakes/ppa
          # Ensure arm64 is included in the newly created deadsnakes source entry.
          for f in /etc/apt/sources.list.d/*deadsnakes*.sources; do
            [ -f "$f" ] || continue
            if grep -q '^Architectures:' "$f"; then
              sudo sed -i 's/^Architectures:.*/Architectures: amd64 arm64/' "$f"
            else
              sudo sed -i '/^Types:/a Architectures: amd64 arm64' "$f"
            fi
          done
          # Add ubuntu-ports as the arm64 base package source
          CODENAME=$(lsb_release -cs)
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME} main restricted universe" | \
            sudo tee /etc/apt/sources.list.d/ubuntu-arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates main restricted universe" | \
            sudo tee -a /etc/apt/sources.list.d/ubuntu-arm64-ports.list
          sudo apt-get update -q
          # Install libpython3.13-dev (not python3.13-dev) to avoid python3.13:arm64
          # whose postinst tries to execute the arm64 binary on the x86_64 host.
          # libpython3.13-dev provides the headers and libpython3.13.so symlink
          # that PyO3 needs for cross-compilation; it only depends on the shared
          # library package, which configures cleanly via ldconfig.
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libpython3.13-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PYO3_CROSS_PYTHON_VERSION=3.13" >> "$GITHUB_ENV"
          echo "PYO3_CROSS_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> "$GITHUB_ENV"
      - name: Set PYO3_PYTHON for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: echo "PYO3_PYTHON=python" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: logmedic-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
